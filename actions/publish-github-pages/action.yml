name: "publish github pages"

description: "Generate Epythet documentation and push to github pages branch"

inputs:
  ignore:
    description: "skip file in documentation generation, if path contains any ignore strings"
    required: false

  github-token:
    description: GITHUB_TOKEN
    required: true

  docs-branch:
    description: "Branch to push documentation build"
    required: false
    default: "gh-pages"

  docs-dir:
    description: "Location of generated docs"
    required: false
    default: "./docsrc/_build/html/"

  python-version:
    description: "Python version used to generate documentation"
    required: false
    default: "3.10"

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Epythet
      run: |
        python -m pip install --upgrade pip
        pip -q install epythet
      shell: bash

    - name: Install Repo Project
      run: pip install -e .
      shell: bash

    - name: Generate Documentation
      run: epythet quickstart . --ignore ${{ inputs.ignore }}
      shell: bash

    - name: Deploy GitHub Pages
      uses: peaceiris/actions-gh-pages@v3.9.1
      with:
        github_token: ${{ inputs.github-token }}
        publish_branch: ${{ inputs.docs-branch }}
        publish_dir: ${{ inputs.docs-dir }}
        enable_jekyll: true
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'

    - name: Enable GitHub Pages source
      run: |
        # Enable Pages if not already configured, or update if misconfigured.
        # This is idempotent -- safe to run on every CI invocation.
        REPO="${{ github.repository }}"
        BRANCH="${{ inputs.docs-branch }}"
        # Try to create (POST). If Pages already exists, API returns 409 -- then update (PUT).
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -X POST \
          -H "Authorization: token ${{ inputs.github-token }}" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${REPO}/pages" \
          -d "{\"build_type\":\"legacy\",\"source\":{\"branch\":\"${BRANCH}\",\"path\":\"/\"}}")
        if [ "$STATUS" = "409" ] || [ "$STATUS" = "422" ]; then
          # Already exists -- update source to ensure correct config
          curl -s -o /dev/null \
            -X PUT \
            -H "Authorization: token ${{ inputs.github-token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${REPO}/pages" \
            -d "{\"source\":{\"branch\":\"${BRANCH}\",\"path\":\"/\"}}"
        fi
        echo "GitHub Pages source set to ${BRANCH} / (root)"
      shell: bash
